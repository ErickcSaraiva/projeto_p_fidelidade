<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Moedas Enviadas!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&amp;family=Quicksand:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#ffb77f",
                        "on-surface": "#e1e2e9",
                        "surface-dim": "#101418",
                        "outline-variant": "#414751",
                        "surface-bright": "#36393f",
                        "primary-fixed-dim": "#a4c9ff",
                        "error": "#ffb4ab",
                        "secondary-container": "#6b3a0c",
                        "on-tertiary-fixed": "#291800",
                        "on-error-container": "#ffdad6",
                        "on-primary": "#00315d",
                        "primary-container": "#4d93e5",
                        "on-secondary": "#4e2600",
                        "on-secondary-fixed": "#2f1500",
                        "background": "#101418",
                        "outline": "#8b919d",
                        "surface-variant": "#32353a",
                        "primary": "#a4c9ff",
                        "on-surface-variant": "#c1c7d3",
                        "on-primary-fixed": "#001c39",
                        "on-tertiary-container": "#3c2500",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "surface-container": "#1d2025",
                        "on-tertiary-fixed-variant": "#633f00",
                        "on-background": "#e1e2e9",
                        "tertiary-fixed-dim": "#ffb953",
                        "surface": "#101418",
                        "tertiary-fixed": "#ffddb4",
                        "secondary": "#ffb77f",
                        "on-secondary-fixed-variant": "#6b3a0c",
                        "inverse-on-surface": "#2e3036",
                        "inverse-primary": "#0060ac",
                        "tertiary-container": "#c58305",
                        "on-primary-fixed-variant": "#004883",
                        "on-tertiary": "#452b00",
                        "surface-container-low": "#191c21",
                        "surface-container-high": "#272a2f",
                        "secondary-fixed": "#ffdcc4",
                        "primary-fixed": "#d4e3ff",
                        "inverse-surface": "#e1e2e9",
                        "on-primary-container": "#002a51",
                        "surface-tint": "#a4c9ff",
                        "on-secondary-container": "#eba66f",
                        "surface-container-highest": "#32353a",
                        "tertiary": "#ffb953",
                        "surface-container-lowest": "#0b0e13"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "24px",
                        "margin-desktop": "64px",
                        "margin-mobile": "20px",
                        "stack-gap": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Quicksand"],
                        "headline-lg": ["Quicksand"],
                        "body-md": ["Nunito Sans"],
                        "label-bold": ["Quicksand"],
                        "display-lg": ["Quicksand"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "20px", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-1px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .bounce-animation {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
        .soft-glow {
            box-shadow: 0 0 30px rgba(164, 201, 255, 0.2);
        }
        .pressed-effect:active {
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
            transform: scale(0.95);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop overflow-hidden relative">
<!-- Decorative floating clouds background -->
<div class="absolute inset-0 pointer-events-none opacity-20 flex justify-between items-center px-10">
<span class="material-symbols-outlined text-surface-tint text-9xl bounce-animation" style="animation-delay: 0s;">cloud</span>
<span class="material-symbols-outlined text-surface-tint text-9xl bounce-animation" style="animation-delay: 1s;">cloud</span>
</div>
<!-- Main Success Card (The Cloud Container) -->
<main class="w-full max-w-md bg-surface-container-high rounded-xl p-container-padding flex flex-col items-center text-center soft-glow relative z-10 border border-outline-variant/30">
<!-- Success Icon Box -->
<div class="mb-stack-gap">
<div class="w-32 h-32 bg-primary rounded-full flex items-center justify-center soft-glow bounce-animation">
<span class="material-symbols-outlined text-on-primary text-6xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-stack-gap">
            Moedas Enviadas!
        </h1>
<!-- Details -->
<p class="font-body-md text-body-md text-on-surface-variant mb-container-padding bg-surface-container-low px-4 py-3 rounded-lg w-full">
            Você mandou <strong class="text-tertiary">50 moedas</strong> para a máquina <strong class="text-secondary">Garra Teddy #42</strong>.
        </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-4 mt-4">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-4 rounded-full pressed-effect transition-all duration-200 shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
                JOGAR AGORA!
            </button>
<button class="w-full bg-surface-container-low text-on-surface font-label-bold text-label-bold py-4 rounded-full pressed-effect transition-all duration-200 border border-outline-variant/50 hover:bg-surface-variant">
                VOLTAR
            </button>
</div>
</main>
<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', function() {
                this.classList.add('scale-95');
            });
            btn.addEventListener('mouseup', function() {
                this.classList.remove('scale-95');
            });
            btn.addEventListener('mouseleave', function() {
                this.classList.remove('scale-95');
            });
        });
    </script>
</body></html>
