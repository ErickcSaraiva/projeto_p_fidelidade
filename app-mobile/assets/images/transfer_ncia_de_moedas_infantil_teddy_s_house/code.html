<style>
        /* Custom animations for the playful tactile feel */
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes pulse-wave {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-gentle-bounce { animation: gentle-bounce 3s ease-in-out infinite; }
        .nfc-wave { animation: pulse-wave 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; border: 3px solid #a4c9ff; border-radius: 50%; position: absolute; }
        .nfc-wave-1 { width: 60px; height: 60px; animation-delay: 0s; }
        .nfc-wave-2 { width: 100px; height: 100px; animation-delay: 0.6s; }
        .nfc-wave-3 { width: 140px; height: 140px; animation-delay: 1.2s; }
        
        /* Squishy button effect */
        .btn-squish:active {
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.4);

</div>
</div>

<!-- Playful NFC Illustration Area -->

</button>
<button class="coin-btn relative bg-surface-container-low flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary ring-2 ring-primary/20 bg-surface-container-high scale-105 transition-all active:scale-95 group focus:outline-none shadow-[inset_0_-4px_10px_rgba(0,0,0,0.2)]" data-value="100" type="button">

<script>
        // Simple JS to handle the visual selection of coin values
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.coin-btn');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Reset all buttons
                    buttons.forEach(b => {
                        b.className = 'coin-btn relative bg-surface-container-low flex flex-col items-center justify-center p-4 rounded-xl border-2 border-outline-variant/50 hover:bg-surface-container transition-all active:scale-95 group focus:outline-none';
                        const badge = b.querySelector('div.absolute');
                        if(badge) badge.remove();
                        
                        const icon = b.querySelector('span.material-symbols-outlined');
                        icon.className = 'material-symbols-outlined text-tertiary text-4xl group-hover:scale-110 transition-transform drop-shadow-[0_2px_4px_rgba(255,185,83,0.3)]';
                        
                        const text = b.querySelectorAll('span')[1];
                        text.className = 'font-headline-lg-mobile text-headline-lg-mobile text-on-surface mt-2 text-2xl';
                    });

                    // Set active state on clicked button
                    btn.className = 'coin-btn relative bg-surface-container-low flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary ring-2 ring-primary/20 bg-surface-container-high scale-105 transition-all active:scale-95 group focus:outline-none shadow-[inset_0_-4px_10px_rgba(0,0,0,0.2)]';
                    
                    const badgeHtml = `
                        <div class="absolute -top-2 -right-2 bg-primary text-on-primary rounded-full w-6 h-6 flex items-center justify-center shadow-md animate-bounce">
                            <span class="material-symbols-outlined text-[16px] font-bold">check</span>
                        </div>
                    `;
                    btn.insertAdjacentHTML('afterbegin', badgeHtml);

                    const icon = btn.querySelectorAll('span.material-symbols-outlined')[1] || btn.querySelector('span.material-symbols-outlined');
                    icon.className = 'material-symbols-outlined text-tertiary text-4xl scale-110 drop-shadow-[0_4px_8px_rgba(255,185,83,0.5)]';
                    
                    const text = btn.querySelectorAll('span.font-headline-lg-mobile')[0];
                    text.className = 'font-headline-lg-mobile text-headline-lg-mobile text-primary-fixed mt-2 text-2xl';
                });
            });
        });
    </script>
